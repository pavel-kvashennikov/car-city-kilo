# Запуск: docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
name: automarket-prod

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/entrypoint.prod.sh"]
    command: ["php-fpm"]
    env_file:
      - .env.prod
    environment: &app-env
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: postgres
      DB_PORT: 5432
      MEILISEARCH_HOST: http://meilisearch:7700
    volumes:
      - .:/var/www/html
      - ./docker/php/production.ini:/usr/local/etc/php/conf.d/production.ini:ro
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - automarket
    healthcheck:
      test: ["CMD-SHELL", "php artisan inspire > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - automarket

  frontend:
    profiles: [build]
    image: node:22-alpine
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: sh -c "npm ci && npm run build"

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/entrypoint.prod.sh"]
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=90 --max-time=3600
    env_file:
      - .env.prod
    environment: *app-env
    volumes:
      - .:/var/www/html
      - ./docker/php/production.ini:/usr/local/etc/php/conf.d/production.ini:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - automarket

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    entrypoint: ["/usr/local/bin/entrypoint.prod.sh"]
    command: php artisan schedule:work
    env_file:
      - .env.prod
    environment: *app-env
    volumes:
      - .:/var/www/html
      - ./docker/php/production.ini:/usr/local/etc/php/conf.d/production.ini:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - automarket

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${DB_DATABASE:-automarket}
      POSTGRES_USER: ${DB_USERNAME:-automarket}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required in .env.prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-automarket} -d ${DB_DATABASE:-automarket}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - automarket

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:?MEILISEARCH_KEY is required in .env.prod}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - automarket

networks:
  automarket:
    driver: bridge

volumes:
  postgres_data:
  meilisearch_data:
