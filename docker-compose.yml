name: automarket

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment: &app-env
      APP_NAME: AutoMarket
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: automarket
      DB_USERNAME: automarket
      DB_PASSWORD: secret
      SESSION_DRIVER: database
      QUEUE_CONNECTION: database
      CACHE_STORE: database
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_KEY: masterKey
      VITE_DEV_SERVER_URL: http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_started
    networks:
      - automarket
    healthcheck:
      test: ["CMD-SHELL", "php artisan inspire > /dev/null 2>&1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - automarket

  vite:
    image: node:22-alpine
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
    environment:
      VITE_USE_POLLING: "true"
      VITE_HMR_HOST: localhost
    networks:
      - automarket

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: php artisan queue:listen --tries=3 --timeout=90
    volumes:
      - .:/var/www/html
    environment: *app-env
    depends_on:
      app:
        condition: service_healthy
    networks:
      - automarket

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: automarket
      POSTGRES_USER: automarket
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U automarket -d automarket"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - automarket

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: masterKey
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    networks:
      - automarket

networks:
  automarket:
    driver: bridge

volumes:
  postgres_data:
  meilisearch_data:
